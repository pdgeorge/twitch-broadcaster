services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    env_file:
      - .env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://overlay:strongpassword@rabbitmq:5672/}
    healthcheck:
      test: [ "CMD", "rabbitmqctl", "status" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - twitchbroadcaster_net

  twitch_receiver:
    build: ./twitch_receiver
    env_file:
      - .env
    volumes:
      - tokens:/data
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://overlay:strongpassword@rabbitmq:5672/}
    restart: unless-stopped
    networks:
      - twitchbroadcaster_net

  overlay_controller:
    build: ./overlay_controller
    env_file:
      - .env
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://overlay:strongpassword@rabbitmq:5672/}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-twitch_events}
      OVERLAY_QUEUE: ${OVERLAY_QUEUE:-overlay_chat}
      OVERLAY_HTTP_PORT: ${OVERLAY_HTTP_PORT:-8080}
      OVERLAY_STATIC_DIR: /app/overlay
    volumes:
      - ./overlay:/app/overlay:ro
      - ./data:/data
    ports:
      - "${OVERLAY_HTTP_PORT:-8080}:${OVERLAY_HTTP_PORT:-8080}"
    depends_on:
      rabbitmq:
        condition: service_healthy
      mysql:
        condition: service_healthy
      twitch_receiver:
        condition: service_started
    restart: unless-stopped
    networks:
      - twitchbroadcaster_net

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: echoes
      MYSQL_USER: echoes
      MYSQL_PASSWORD: echoespw
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - twitchbroadcaster_net

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - twitchbroadcaster_net
      - dabidotcom_net

volumes:
  tokens:
  mysql_data:


networks:
  twitchbroadcaster_net:
    external: true
